- !!python/object/apply:collections.OrderedDict
  - - - id
      - assess-without-the-question
    - - title
      - Assess Without the Question
    - - description
      - "All work performed in the Assess phase must be independent of the specific\
        \ analysis question being asked. Assessment is about understanding the data\
        \ as it is \u2014 its structure, quality, encodings, missing values, outliers,\
        \ and provenance \u2014 not about preparing it for a particular model or analysis.\
        \ This ensures that the assess layer is reusable across multiple analyses\
        \ and by multiple analysts. Decisions made in assess that are shaped by the\
        \ downstream question contaminate the data understanding and make it impossible\
        \ to share or reuse."
    - - quote
      - Understand the data before you ask it a question.
- !!python/object/apply:collections.OrderedDict
  - - - id
      - legal-ethical-access
    - - title
      - Legal and Ethical Data Access
    - - description
      - The Access phase must include explicit consideration of the legal and ethical
        basis for using each data source. This covers intellectual property rights
        (database copyright, license agreements), individual privacy rights (GDPR,
        CCPA, and equivalent frameworks), data provenance (where did this data come
        from, who collected it, and how), and ethical use (consent, potential harms
        to individuals or groups). Access code and documentation must record these
        considerations, not treat them as implicit or assumed. Data that cannot be
        accessed legally or ethically must not be used.
    - - quote
      - "Getting the data is not just a technical problem \u2014 it is a legal and\
        \ ethical one too."
- !!python/object/apply:collections.OrderedDict
  - - - id
      - operational-data-science
    - - title
      - Designed for Operational Data Science
    - - description
      - "The Fynesse framework is designed for the real-world conditions of operational\
        \ data science, where data is live, evolving, and sometimes messy \u2014 not\
        \ the idealised conditions of a clean benchmark dataset and a fixed research\
        \ question. Operational contexts include pandemic response, supply chain management,\
        \ policy analysis, and any setting where decisions must be made from imperfect\
        \ data under time pressure. In these settings, a clear separation of concerns,\
        \ repeatable assessment, and ethically grounded access are not luxuries \u2014\
        \ they are prerequisites for trustworthy analysis. The framework should be\
        \ lightweight enough to be adopted quickly and robust enough to support ongoing,\
        \ evolving work."
    - - quote
      - "Real data science happens under pressure, with imperfect data, in evolving\
        \ situations \u2014 the framework must be ready for that."
- !!python/object/apply:collections.OrderedDict
  - - - id
      - repeatable-assessment
    - - title
      - Repeatable and Shareable Assessment
    - - description
      - 'The assess layer should be written so that any analyst working on the same
        dataset can use it directly, regardless of their specific analysis question.
        Assessment work is a public good: understanding the structure, quality, and
        properties of a dataset benefits everyone who works with it, and that work
        should not need to be repeated. Assess functions should be deterministic,
        documented, and free of side effects that depend on the analyst''s environment
        or question. Where possible, assess outputs (quality summaries, visualisations,
        cleaned data structures) should be shareable with collaborators.'
    - - quote
      - Do the assessment work once, well, and share it.
- !!python/object/apply:collections.OrderedDict
  - - - id
      - separation-of-concerns
    - - title
      - Separation of Access, Assess, and Address
    - - description
      - "The three phases of data science work \u2014 Access, Assess, and Address\
        \ \u2014 must remain distinct and separated. Access is concerned with obtaining\
        \ data from its source; Assess is concerned with understanding the nature\
        \ of that data; Address is concerned with answering a specific question using\
        \ that data. Each phase has a clear boundary, a distinct purpose, and must\
        \ not bleed into the others. Code, documentation, and notebooks should make\
        \ this separation explicit."
    - - quote
      - "Three phases, three concerns, two boundaries \u2014 the clarity of each protects\
        \ the integrity of all."
- !!python/object/apply:collections.OrderedDict
  - - - id
      - systems-engineering-mindset
    - - title
      - 'Structured Exploration: Repeatable Outputs from an Iterative Process'
    - - description
      - "Data science is fundamentally exploratory \u2014 a spiral of iteration in\
        \ which understanding of the data, the question, and the method co-evolve.\
        \ This is not a weakness to be engineered away; it is intrinsic to the discipline.\
        \ The Fynesse framework does not try to eliminate exploration. Instead it\
        \ provides structure so that the *outputs* of exploration are repeatable and\
        \ the *decisions made during* exploration are documented. The distinction\
        \ between Access, Assess, and Address is a record of where the analyst is\
        \ in the spiral, not a waterfall of sequential steps. Systems engineering\
        \ thinking applies not to the process itself but to the artefacts it produces:\
        \ a deployed pipeline must handle real-world constraints; a shared assess\
        \ layer must be reproducible; an access function must remain maintainable\
        \ as data sources evolve."
    - - quote
      - "The process is a spiral; the outputs should be a ladder \u2014 each rung\
        \ solid enough to stand on."
